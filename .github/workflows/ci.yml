name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      MONGO_URI: mongodb://localhost:27017/flashkart_test
      REDIS_URL: redis://localhost:6379/1
      JWT_ACCESS_SECRET: ci-access-secret-at-least-16-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-16-chars-long
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm install --workspaces --include-workspace-root

      - name: Typecheck (api)
        run: npm run typecheck --workspace @flashkart/api

      - name: Typecheck (worker)
        run: npm run typecheck --workspace @flashkart/worker

      - name: Typecheck (web)
        run: npm run typecheck --workspace @flashkart/web

      - name: Test (api)
        run: npm test --workspace @flashkart/api
