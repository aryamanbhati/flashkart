server {
    # Railway routes traffic to the container's exposed port. We listen on 80
    # inside the container; Railway's edge terminates TLS in front.
    listen 80;
    server_name _;

    # Long-cache the hashed asset files Vite emits (main.abc123.js etc.).
    # index.html itself must NOT be cached — otherwise users get stuck on stale
    # bundles referencing hashes that no longer exist.
    root /usr/share/nginx/html;
    index index.html;

    # Static assets: hashed filenames, safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so React Router can
    # handle client-side routing (added in Phase B).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # Basic security headers. Railway also adds some at the edge.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
